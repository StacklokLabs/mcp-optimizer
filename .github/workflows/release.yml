name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  code_checks:
    name: Code Checks
    uses: ./.github/workflows/code-checks.yml

  release:
    needs: code_checks
    name: Release Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download models artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ml-models
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set repository owner lowercase
        id: repo_owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ steps.repo_owner.outputs.OWNER }}/mcp-optimizer
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag.outputs.VERSION }}
          labels: |
            org.opencontainers.image.title=mcp-optimizer
            org.opencontainers.image.description=MCP Optimizer - Intelligent MCP server orchestration
            org.opencontainers.image.vendor=Stacklok
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and push container
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image
        env:
          REGISTRY: ghcr.io/${{ steps.repo_owner.outputs.OWNER }}/mcp-optimizer
        run: |
          # Docker tags do not allow the '+' character, so replace it with '_' for compatibility.
          TAG=$(echo "${{ steps.tag.outputs.VERSION }}" | sed 's/+/_/g')
          # Sign the tagged image
          cosign sign -y $REGISTRY:$TAG

          # Sign the latest tag, but only if is_default_branch is true
          if [[ "${{ steps.meta.outputs.is_default_branch }}" == "true" ]]; then
            cosign sign -y $REGISTRY:latest
          fi

  publish-helm-charts:
    name: Publish Helm Charts
    needs: code_checks
    permissions:
      contents: write
      packages: write
      id-token: write
    uses: ./.github/workflows/releaser-helm-charts.yml
